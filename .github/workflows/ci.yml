name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Start LocalStack
        run: docker compose up -d localstack

      - name: Wait for LocalStack to be ready
        run: |
          echo "[INFO] Waiting for LocalStack health check..."
          MAX_ATTEMPTS=40
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if curl -fsS http://localhost:4566/_localstack/health >/dev/null 2>&1; then
              echo "[OK] LocalStack is ready"
              exit 0
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "[INFO] Attempt $ATTEMPT/$MAX_ATTEMPTS - LocalStack not ready yet, waiting 2 seconds..."
            sleep 2
          done
          echo "[ERROR] LocalStack failed to start after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Lint
        run: npm run lint

      - name: Run integration tests
        run: npm run ci:test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build monorepo
        run: npm run ci:build

      - name: Verify release bundle
        run: npm run ci:bundle:verify

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: artifacts/release-bundle.tgz
          retention-days: 30

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/checksums.txt
          retention-days: 30
